kind = "api"
previewPath = "/"
title = "Vertex AI Proxy"
version = "1.0.0"

[[services]]
localPort = 8000
name = "Vertex AI Proxy"
paths = ["/"]

[services.development]
run = "cd artifacts/vertex-proxy && PORT=8000 python3 main.py"

[services.production]

[services.production.build]
args = ["bash", "-c", "pip3 install -r artifacts/vertex-proxy/requirements.txt -q"]

[services.production.run]
args = ["bash", "-c", "cd artifacts/vertex-proxy && python3 main.py"]

[services.production.run.env]
PORT = "8000"

[services.production.health.startup]
path = "/health"
